name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and check only; skip the publish to npm"
        required: false
        default: "false"

concurrency:
  group: release
  cancel-in-progress: false

env:
  HUSKY: "0"

jobs:
  publish:
    runs-on: hetzner
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm ci

      - name: Refresh poses from the live OpenAPI document
        run: npx tsx scripts/generate-poses.ts || echo "spec refresh failed; using committed poses" >&2

      - name: Build
        run: npm run build

      - name: Configure npm auth
        shell: bash
        run: |
          # Some self-hosted runners pre-create $HOME/.npmrc as a directory
          # (act mounts, prior actions/setup-node usage, etc). Clear whatever
          # is at that path before writing the token, so the redirect cannot
          # fail with "Is a directory".
          rm -rf "$HOME/.npmrc"
          umask 077
          printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > "$HOME/.npmrc"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: ${{ inputs.dry_run != 'true' }}
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "createrington-skin-api@$VERSION" version >/dev/null 2>&1; then
            echo "createrington-skin-api@$VERSION already published, skipping"
          else
            npm publish --access public
          fi
