name: Bug report
description: Something in the TypeScript client behaves incorrectly
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. A couple of notes first:

        - This is the **client library**. If the API returns a wrong or missing
          image for a valid request (rendering, a pose looking off), that is a
          service issue, not an SDK bug, and belongs upstream.
        - Never paste your API key, bearer token, or other secrets here.
  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      description: The `createrington-skin-api` npm package version.
      placeholder: "2.3.2"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node version
      description: The Node.js version you run against (or the runtime, e.g. Bun, Deno, browser).
      placeholder: "22.x"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11, Ubuntu 24.04, ..."
    validations:
      required: false
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you call, and what went wrong?
      placeholder: |
        api.render({ pose: "wave", source: { uuid: "..." } }) threw instead of returning bytes.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal repro
      description: A small snippet that reproduces it. Redact your API key.
      render: typescript
    validations:
      required: false
  - type: textarea
    id: error
    attributes:
      label: Error details
      description: >
        If a SkinApiError was thrown, include its code, status, and
        retryAfterMs, plus the stack trace.
    validations:
      required: false
